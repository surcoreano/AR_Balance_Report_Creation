name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: |
          pip install pdfplumber pypdf pyinstaller

      - name: EXE 빌드
        run: |
          pyinstaller --onefile --noconsole --name "AR_Balance_Report_Creation" AR_Balance_Creation.py

      - name: EXE 업로드 (다운로드용)
        uses: actions/upload-artifact@v4
        with:
          name: AR_Balance_Report_Creation_Windows
          path: dist/AR_Balance_Report_Creation.exe
          retention-days: 30
